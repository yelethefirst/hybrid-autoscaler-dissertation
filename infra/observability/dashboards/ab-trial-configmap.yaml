# ab-trial-configmap.yaml
#
# Grafana sidecar auto-imports any ConfigMap labelled grafana_dashboard: "1".
# Applied by install.sh after the Helm release is ready.
# The sidecar watches all namespaces by default in kube-prometheus-stack 58.x.
#
# To reload after editing the JSON:
#   kubectl -n monitoring delete configmap hybrid-autoscaler-ab-trial-dashboard
#   kubectl apply -f infra/observability/dashboards/ab-trial-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: hybrid-autoscaler-ab-trial-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ab-trial.json: |
    {
      "description": "Live monitoring for Hybrid Autoscaler A/B trials and 5-hour telemetry campaigns. Shows p95 latency, RPS, error rate, replica counts and node CPU. Auto-refreshes every 15 s.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "annotations": {
        "list": [
          {
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "enable": true,
            "expr": "changes(kube_deployment_status_replicas_available{namespace=\"default\"}[1m]) > 0",
            "hide": false,
            "iconColor": "blue",
            "name": "Scale event",
            "step": "15s",
            "titleFormat": "Scale event",
            "type": "alert"
          }
        ]
      },
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 20,
          "title": "Latency",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "ms",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true,
                "thresholdsStyle": { "mode": "line" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 500 }
                ]
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "legend": { "calcs": ["last","max","mean"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"default\", pod=~\"frontend-.*\"}[1m]))) * 1000",
              "legendFormat": "p95",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"default\", pod=~\"frontend-.*\"}[1m]))) * 1000",
              "legendFormat": "p50",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"default\", pod=~\"frontend-.*\"}[1m]))) * 1000",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "title": "Frontend Latency — p50 / p95 / p99",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "req/s",
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": {
            "legend": { "calcs": ["last","max","mean"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(http_requests_total{namespace=\"default\"}[1m]))",
              "legendFormat": "Total RPS",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(http_requests_total{namespace=\"default\", code=~\"2..\"}[1m]))",
              "legendFormat": "2xx RPS",
              "refId": "B"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 21,
          "title": "Errors",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "red", "mode": "fixed" },
              "custom": {
                "axisLabel": "err/s",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "reqps"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "4xx/s" },
                "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 7, "w": 14, "x": 0, "y": 10 },
          "id": 3,
          "options": {
            "legend": { "calcs": ["last","max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(http_requests_total{namespace=\"default\", code=~\"5..\"}[1m]))",
              "legendFormat": "5xx/s",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(http_requests_total{namespace=\"default\", code=~\"4..\"}[1m]))",
              "legendFormat": "4xx/s",
              "refId": "B"
            }
          ],
          "title": "Error Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 10, "x": 14, "y": 10 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(http_requests_total{namespace=\"default\", code=~\"5..\"}[1m]))",
              "legendFormat": "5xx/s now",
              "refId": "A"
            }
          ],
          "title": "Current 5xx Rate",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 17 },
          "id": 22,
          "title": "Autoscaler — Replica Counts",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "replicas",
                "decimals": 0,
                "drawStyle": "line",
                "fillOpacity": 0,
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 9, "w": 16, "x": 0, "y": 18 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["last","max"], "displayMode": "table", "placement": "right", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_deployment_status_replicas_available{namespace=\"default\"}",
              "legendFormat": "{{ deployment }}",
              "refId": "A"
            }
          ],
          "title": "Available Replicas per Service (step chart)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 9, "w": 8, "x": 16, "y": 18 },
          "id": 6,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_deployment_status_replicas_available{namespace=\"default\"}",
              "legendFormat": "{{ deployment }}",
              "refId": "A"
            }
          ],
          "title": "Current Replica Counts",
          "type": "bargauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 27 },
          "id": 23,
          "title": "Node Resources",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "cores",
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 28 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["last","max","mean"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (instance) (rate(node_cpu_seconds_total{mode!=\"idle\"}[1m]))",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ],
          "title": "Node CPU Usage (active cores)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 28 },
          "id": 8,
          "options": {
            "legend": { "calcs": ["last","max","mean"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(container_memory_working_set_bytes{namespace=\"default\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "App pods",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(container_memory_working_set_bytes{namespace=\"monitoring\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "Monitoring stack",
              "refId": "B"
            }
          ],
          "title": "Memory Working Set",
          "type": "timeseries"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "tags": ["hybrid-autoscaler", "ab-trial", "telemetry-campaign"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {
        "refresh_intervals": ["5s","10s","15s","30s","1m","5m"]
      },
      "timezone": "browser",
      "title": "Hybrid Autoscaler — A/B Trial & Campaign Monitor",
      "uid": "hybrid-ab-trial-v1",
      "version": 1
    }
