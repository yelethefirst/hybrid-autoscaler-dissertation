# nginx-thrift-dsb.yaml — DeathStarBench Social Network frontend (T5.3 demo).
# rho = cpu_request(100m, set by infra/deathstarbench/install.sh) x 0.50
# (request-based per DEV-020). Online forecaster: no training campaign needed.
service: nginx-thrift
namespace: socialnet

r_min: 1
r_max: 4
delta_s: 2

rho: 0.0500
k: 1.5
sigma_max: 0.20
sigma_warn_ratio: 0.7

horizon_seconds: 30
tick_seconds: 15
history_seconds: 600

target_utilisation: 0.5
hpa_stabilisation_window_seconds: 300

metric_source: cpu

evidence_path: experiments/results/dsb-nginx-thrift.jsonl
