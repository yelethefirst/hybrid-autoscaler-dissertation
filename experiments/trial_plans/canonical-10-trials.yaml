# ⛔ DEPRECATED — PILOT PLAN, retained for provenance only.
# This is the plan the 2026-07-03 pilot ran: 10 trials TOTAL (not per cell),
# fixed hybrid-first order, no measurement offsets — defects DEV-014..017.
# The real pre-registered design is canonical-v2.yaml, generated by
# generate_plan.py. Do not run this file.
#
# canonical-10-trials.yaml
#
# Phase 5 canonical A/B experiment plan: 2 autoscalers × 4 workloads × 10 trials.
# Trial order is pre-randomised (seed=42) so the run is deterministic.
# The supervisor respects this order; do not sort trials alphabetically.
#
# Prerequisites:
#   1. Phase 0 cluster running with Online Boutique + Prometheus.
#   2. Phase 3 model registry available at MODEL_REGISTRY env var or the path below.
#   3. wrk2 on PATH: brew install wrk2
#   4. Prometheus port-forwarded to localhost:9090
#
# Run:
#   uv run python -m experiments.supervisor \
#     --plan experiments/trial_plans/canonical-10-trials.yaml
#
# Dry-run (no subprocesses or kubectl):
#   uv run python -m experiments.supervisor \
#     --plan experiments/trial_plans/canonical-10-trials.yaml --dry-run

name: canonical-ab-10-trials
description: >
  2 × 4 × 10 A/B experiment comparing Kubernetes HPA (baseline) against the
  Hybrid Predictive Autoscaler across burst, ramp, periodic, and trace-replay
  workloads. Pre-randomised order with seed 42.

result_dir: experiments/results
n_trials_per_cell: 10
hpa_manifest: experiments/hpa/frontend-hpa.yaml
controller_config: controller/configs/ab/frontend-ab.yaml
model_registry: experiments/results/phase3_20260703T090249Z_model_registry.yaml
stabilisation_wait_seconds: 120

trials:
  # ── burst ────────────────────────────────────────────────────────────────
  - trial_id: burst-hybrid-001
    autoscaler: hybrid
    workload: burst
    seed: 1001
    locust_file: experiments/workloads/burst.py
    locust_users: 500
    locust_spawn_rate: 50
    locust_duration_seconds: 720    # 12 min
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 120      # wrk2 runs during the burst phase
    wrk2_url: http://localhost:30080/
    env:
      BASELINE_USERS: "50"
      PEAK_USERS: "500"
      WARMUP_SECONDS: "300"
      BURST_SECONDS: "120"
      COOLDOWN_SECONDS: "300"

  - trial_id: burst-hpa-001
    autoscaler: hpa
    workload: burst
    seed: 2001
    locust_file: experiments/workloads/burst.py
    locust_users: 500
    locust_spawn_rate: 50
    locust_duration_seconds: 720
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 120
    wrk2_url: http://localhost:30080/
    env:
      BASELINE_USERS: "50"
      PEAK_USERS: "500"
      WARMUP_SECONDS: "300"
      BURST_SECONDS: "120"
      COOLDOWN_SECONDS: "300"

  - trial_id: burst-hybrid-002
    autoscaler: hybrid
    workload: burst
    seed: 1002
    locust_file: experiments/workloads/burst.py
    locust_users: 500
    locust_spawn_rate: 50
    locust_duration_seconds: 720
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 120
    wrk2_url: http://localhost:30080/
    env:
      BASELINE_USERS: "50"
      PEAK_USERS: "500"
      WARMUP_SECONDS: "300"
      BURST_SECONDS: "120"
      COOLDOWN_SECONDS: "300"

  - trial_id: burst-hpa-002
    autoscaler: hpa
    workload: burst
    seed: 2002
    locust_file: experiments/workloads/burst.py
    locust_users: 500
    locust_spawn_rate: 50
    locust_duration_seconds: 720
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 120
    wrk2_url: http://localhost:30080/
    env:
      BASELINE_USERS: "50"
      PEAK_USERS: "500"
      WARMUP_SECONDS: "300"
      BURST_SECONDS: "120"
      COOLDOWN_SECONDS: "300"

  # ── ramp ─────────────────────────────────────────────────────────────────
  - trial_id: ramp-hybrid-001
    autoscaler: hybrid
    workload: ramp
    seed: 1101
    locust_file: experiments/workloads/ramp.py
    locust_users: 500
    locust_spawn_rate: 1
    locust_duration_seconds: 1500   # 25 min
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 300      # wrk2 runs at plateau
    wrk2_url: http://localhost:30080/
    env:
      FLOOR_USERS: "50"
      PEAK_USERS: "500"
      RAMP_SECONDS: "600"
      HOLD_SECONDS: "300"

  - trial_id: ramp-hpa-001
    autoscaler: hpa
    workload: ramp
    seed: 2101
    locust_file: experiments/workloads/ramp.py
    locust_users: 500
    locust_spawn_rate: 1
    locust_duration_seconds: 1500
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 300
    wrk2_url: http://localhost:30080/
    env:
      FLOOR_USERS: "50"
      PEAK_USERS: "500"
      RAMP_SECONDS: "600"
      HOLD_SECONDS: "300"

  # ── periodic ─────────────────────────────────────────────────────────────
  - trial_id: periodic-hybrid-001
    autoscaler: hybrid
    workload: periodic
    seed: 1201
    locust_file: experiments/workloads/periodic.py
    locust_users: 500
    locust_spawn_rate: 50
    locust_duration_seconds: 1800   # 30 min (3 × 10-min cycles)
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 600      # wrk2 runs for one full period
    wrk2_url: http://localhost:30080/
    env:
      FLOOR_USERS: "50"
      PEAK_USERS: "500"
      PERIOD_SECONDS: "600"
      NUM_PERIODS: "3"

  - trial_id: periodic-hpa-001
    autoscaler: hpa
    workload: periodic
    seed: 2201
    locust_file: experiments/workloads/periodic.py
    locust_users: 500
    locust_spawn_rate: 50
    locust_duration_seconds: 1800
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 600
    wrk2_url: http://localhost:30080/
    env:
      FLOOR_USERS: "50"
      PEAK_USERS: "500"
      PERIOD_SECONDS: "600"
      NUM_PERIODS: "3"

  # ── trace_replay ─────────────────────────────────────────────────────────
  - trial_id: trace-hybrid-001
    autoscaler: hybrid
    workload: trace_replay
    seed: 1301
    locust_file: experiments/workloads/trace_replay.py
    locust_users: 500
    locust_spawn_rate: 50
    locust_duration_seconds: 1800   # 30 min — trace must cover this duration
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 300
    wrk2_url: http://localhost:30080/
    env:
      TRACE_FILE: experiments/traces/alibaba_rps_30m.csv
      FLOOR_USERS: "50"
      PEAK_USERS: "500"

  - trial_id: trace-hpa-001
    autoscaler: hpa
    workload: trace_replay
    seed: 2301
    locust_file: experiments/workloads/trace_replay.py
    locust_users: 500
    locust_spawn_rate: 50
    locust_duration_seconds: 1800
    wrk2_threads: 4
    wrk2_connections: 100
    wrk2_rate: 100
    wrk2_duration_seconds: 300
    wrk2_url: http://localhost:30080/
    env:
      TRACE_FILE: experiments/traces/alibaba_rps_30m.csv
      FLOOR_USERS: "50"
      PEAK_USERS: "500"
